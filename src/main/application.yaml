spring:
  application:
    name: powerlifting-coach

  datasource:
    url: jdbc:postgresql://localhost:5432/coach
    username: coach
    password: coach

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.1:8b
          temperature: 0.3

server:
  port: 8080

coach:
  video:
    storage-path: ./uploads
    fps: 5
    max-duration-seconds: 60
  ffmpeg:
    path: coach:
  ffmpeg:
    path: C:\Users\ffmpeg-8.1.1
  pose:
    confidence-threshold: 0.5

logging:
  level:
    no.marius.coach: DEBUG
    org.springframework.ai: INFO