spring.application.name=powerlifting-coach
spring.datasource.url=jdbc:postgresql://localhost:5432/coach
spring.datasource.username=coach
spring.datasource.password=coach
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Spring AI - Ollama Configuration
spring.ai.ollama.base-url=http://localhost:11434/api/generate
spring.ai.ollama.chat.model=llama3.1:8b
spring.ai.ollama.chat.options.temperature=0.3

#DJL
server.port=8080
coach.video.storage-path=./uploads
coach.video.fps=5
coach.video.max-duration-seconds=60
coach.ffmpeg.path=C:\\Users\\ffmpeg-8.1.1
coach.pose.confidence-threshold=0.5
logging.level.no.marius.coach=DEBUG
logging.level.org.springframework.ai=DEBUG
